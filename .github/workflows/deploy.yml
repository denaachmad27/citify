# Build & deploy Citify ke Cloudflare Pages
# Trigger: setiap push ke branch main, atau manual via workflow_dispatch
# Kebutuhan secrets di GitHub repo settings:
#   - CLOUDFLARE_API_TOKEN: https://dash.cloudflare.com/profile/api-tokens
#     Permission: Cloudflare Pages: Edit
#   - CLOUDFLARE_ACCOUNT_ID: ID akun Cloudflare (lihat di dashboard)

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Next.js untuk Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build dengan @cloudflare/next-on-pages
        run: npx @cloudflare/next-on-pages@1.12.0
        env:
          # Non-aktifkan telemetry Vercel CLI
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Pages artifact
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: citify
          directory: .vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
